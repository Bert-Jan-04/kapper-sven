<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Kapper Sven</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box h1 {
      color: #c9a84c;
      font-size: 1.6rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .login-box p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #c9a84c;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #c9a84c;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #e0bf6a;
    }

    .foutmelding {
      background: #3a1a1a;
      border: 1px solid #c0392b;
      color: #e74c3c;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Kapper Sven</h1>
    <p>Admin beheer</p>

    {{FOUTMELDING}}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="gebruikersnaam">Gebruikersnaam</label>
        <input type="text" id="gebruikersnaam" name="gebruikersnaam" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="wachtwoord">Wachtwoord</label>
        <input type="password" id="wachtwoord" name="wachtwoord" autocomplete="current-password" required />
      </div>
      <button type="submit">Inloggen</button>
    </form>
  </div>
</body>
</html>
